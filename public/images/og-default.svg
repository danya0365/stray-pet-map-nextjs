<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="80" fill="#fbbf24" opacity="0.3"/>
  <circle cx="1100" cy="500" r="120" fill="#f97316" opacity="0.2"/>
  <circle cx="200" cy="550" r="60" fill="#84cc16" opacity="0.2"/>
  <circle cx="1000" cy="150" r="50" fill="#06b6d4" opacity="0.2"/>
  
  <!-- Paw Prints Pattern -->
  <g opacity="0.1" fill="#92400e">
    <ellipse cx="150" cy="300" rx="20" ry="25"/>
    <ellipse cx="120" cy="270" rx="8" ry="10"/>
    <ellipse cx="140" cy="260" rx="8" ry="10"/>
    <ellipse cx="160" cy="260" rx="8" ry="10"/>
    <ellipse cx="180" cy="270" rx="8" ry="10"/>
    
    <ellipse cx="1050" cy="400" rx="20" ry="25"/>
    <ellipse cx="1020" cy="370" rx="8" ry="10"/>
    <ellipse cx="1040" cy="360" rx="8" ry="10"/>
    <ellipse cx="1060" cy="360" rx="8" ry="10"/>
    <ellipse cx="1080" cy="370" rx="8" ry="10"/>
  </g>
  
  <!-- Pet Emojis -->
  <text x="80" y="200" font-size="120" filter="url(#shadow)">🐕</text>
  <text x="1000" y="250" font-size="100" filter="url(#shadow)">🐈</text>
  <text x="150" y="480" font-size="80" filter="url(#shadow)">🦴</text>
  <text x="1020" y="520" font-size="90" filter="url(#shadow)">🐾</text>
  <text x="90" y="350" font-size="60" filter="url(#shadow)">🎾</text>
  <text x="1050" y="380" font-size="70" filter="url(#shadow)">🧶</text>
  
  <!-- Main Content Container -->
  <rect x="200" y="140" width="800" height="350" rx="24" fill="white" opacity="0.9" filter="url(#shadow)"/>
  
  <!-- Logo/Icon -->
  <text x="600" y="220" font-size="80" text-anchor="middle">🐾</text>
  
  <!-- Main Title -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#1f2937" text-anchor="middle">StrayPetMap</text>
  
  <!-- Tagline -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#4b5563" text-anchor="middle">ช่วยให้สัตว์มีบ้าน 🏠</text>
  
  <!-- Description -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle">แพลตฟอร์มแผนที่สัตว์จร จัดโดยคนไทย เพื่อคนไทย</text>
  
  <!-- CTA Badge -->
  <rect x="450" y="460" width="300" height="50" rx="25" fill="#f97316"/>
  <text x="600" y="492" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">ร่วมช่วยเหลือน้องๆ กัน 🤝</text>
  
  <!-- Bottom hearts -->
  <text x="350" y="580" font-size="40" opacity="0.6">❤️</text>
  <text x="850" y="580" font-size="40" opacity="0.6">💚</text>
</svg>
